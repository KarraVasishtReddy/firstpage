<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vasisht Reddy K | Data Engineer Portfolio</title>
    <style>
        :root {
            --primary: #0f172a;
            --accent: #2563eb;
            --bg: #f8fafc;
            --card: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background-color: var(--bg); color: var(--text-main); line-height: 1.6; }
        
        .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
        
        /* Header */
        header { text-align: center; margin-bottom: 50px; }
        h1 { font-size: 2.8rem; color: var(--primary); letter-spacing: -0.02em; }
        .contact-info { margin-top: 15px; color: var(--text-muted); font-size: 1rem; }
        .contact-info span { margin: 0 10px; }
        .links { margin-top: 15px; }
        .links a { color: var(--accent); text-decoration: none; font-weight: 600; margin: 0 12px; transition: opacity 0.2s; }
        .links a:hover { opacity: 0.8; }

        /* Sections */
        .section { background: var(--card); padding: 40px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); margin-bottom: 30px; border: 1px solid #e2e8f0; }
        h2 { font-size: 1.4rem; color: var(--primary); margin-bottom: 25px; text-transform: uppercase; letter-spacing: 0.05em; border-left: 4px solid var(--accent); padding-left: 15px; }

        /* Summary & Highlights */
        .highlight-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px; margin-top: 25px; }
        .highlight-card { background: #f1f5f9; padding: 20px; border-radius: 12px; text-align: center; }
        .highlight-card strong { display: block; font-size: 1.8rem; color: var(--accent); line-height: 1.2; }
        .highlight-card span { font-size: 0.85rem; color: var(--text-muted); font-weight: 500; }

        /* Skills */
        .skills-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .skill-cat strong { display: block; color: var(--primary); margin-bottom: 8px; font-size: 0.95rem; }
        .skill-tags { display: flex; flex-wrap: wrap; gap: 8px; }
        .tag { background: #eef2ff; color: #4338ca; padding: 4px 12px; border-radius: 6px; font-size: 0.85rem; font-weight: 500; }

        /* Experience & Projects */
        .item { margin-bottom: 35px; }
        .item:last-child { margin-bottom: 0; }
        .item-header { display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap; margin-bottom: 8px; }
        .item-title { font-size: 1.15rem; font-weight: 700; color: var(--primary); }
        .item-org { color: var(--accent); font-weight: 600; font-size: 1rem; }
        .item-date { font-size: 0.9rem; color: var(--text-muted); font-weight: 500; }
        
        ul { list-style-type: none; }
        li { position: relative; padding-left: 20px; margin-bottom: 10px; font-size: 0.95rem; color: #475569; }
        li::before { content: "→"; position: absolute; left: 0; color: var(--accent); font-weight: bold; }

        /* Project Context Styling */
        .project-challenge { font-weight: 700; color: var(--primary); display: block; margin-top: 5px; font-size: 0.9rem; }

        /* Education & Certs */
        .edu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        .cert-list { columns: 1; list-style: none; }

        @media (max-width: 640px) {
            .skills-grid, .edu-grid { grid-template-columns: 1fr; }
            h1 { font-size: 2rem; }
            .item-header { flex-direction: column; }
        }
    </style>
</head>
